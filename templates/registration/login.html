{% extends "core/base.html" %}

{% load static %}

{% block title %}Iniciar Sesión{% endblock title %}

{% block content %}

<div id="id_login_page">
    <div id="id_login_section">

        <div id="id_login_header">
            <div id="id_logo">
                <img src="{% static 'images/logo.png' %}" alt="universe">
            </div>
            <h1>Bienvenido a <span>UNIVERSE</span></h1>
        </div>
        
        <form method="post" id="id_login_form">
            <p id="id_login_form_header">Iniciar sesión</p>
            {% csrf_token %}
            <label for="{{ form.username.html_name }}" class="form-label">{{ form.username.label }}</label>
            <input type="text" name="username" placeholder="Nombre de usuario" maxlength="150" class="form-input" id="{{ form.username.html_name}}" required>
            <label for="{{ form.password.html_name }}" class="form-label">{{ form.password.label }}</label>
            <input type="password" name="password" placeholder="Contraseña" class="form-input" id="{{ form.password.html_name }}" required>
            <button type="submit" class="form-btn">Ingresar</button>
            <p id="id_login_form_signup">O, si no tienes cuenta, <a href="{% url "signup" %}">regístrate</a></p>
        </form>
    </div>
    <div id="id_login_bg_image">
        <img src="{% static 'images/bg_login.jpg' %}" alt="">
    </div>


</div>

{% endblock content %}
